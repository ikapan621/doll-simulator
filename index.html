<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2D 娃娃背包包模擬器 V2.3 (真·原吋不拉伸版)</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f5f5f5;
            display: flex;
            height: 100vh;
            box-sizing: border-box;
            overflow: hidden;
            position: relative;
        }

        /* 手機版頂部工具列 */
        .mobile-header {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 50px;
            background-color: #ffffff;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            z-index: 99;
            align-items: center;
            padding: 0 15px;
            box-sizing: border-box;
        }

        .toggle-btn {
            background-color: #ffb6c1;
            color: #fff;
            border: none;
            padding: 8px 14px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.9rem;
        }

        /* 控制面板 */
        .control-panel {
            width: 360px;
            min-width: 360px;
            background-color: #ffffff;
            padding: 20px;
            box-shadow: 2px 0 5px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            gap: 15px;
            overflow-y: auto;
            z-index: 100;
            transition: transform 0.3s ease;
        }

        .close-sidebar-btn {
            display: none;
            background-color: #ccc;
            color: #333;
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            align-self: flex-end;
            cursor: pointer;
        }

        h2 { margin: 0 0 5px 0; font-size: 1.4rem; color: #333; }
        .row-group { display: flex; gap: 12px; width: 100%; }
        .row-group .control-group { flex: 1; }
        .control-group { display: flex; flex-direction: column; gap: 6px; }
        
        .dynamic-group {
            background-color: #f9f9f9;
            padding: 12px;
            border-radius: 6px;
            border-left: 4px solid #ffb6c1;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        label { font-weight: bold; color: #555; font-size: 0.9rem; }
        select { padding: 8px; border-radius: 4px; border: 1px solid #ccc; font-size: 0.95rem; background-color: #fff; }

        /* 色票樣式 */
        .color-palette { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 2px; }
        .color-swatch {
            width: 30px;
            height: 30px;
            border-radius: 4px;
            border: 2px solid #ccc;
            cursor: pointer;
            transition: transform 0.1s;
        }
        .color-swatch:hover { transform: scale(1.1); }
        .color-swatch.active { border-color: #333; box-shadow: 0 0 4px rgba(0,0,0,0.3); }

        /* 右側畫布區 */
        .display-area {
            flex: 1;
            background-color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: auto;
            padding: 20px;
        }

        .canvas {
            position: relative;
            width: 550px;
            height: 550px;
            min-width: 550px;
            min-height: 550px;
            border: 2px solid #ccc;
            background-color: #fafafa;
            background-image: 
                linear-gradient(to right, #e8e8e8 1px, transparent 1px),
                linear-gradient(to bottom, #e8e8e8 1px, transparent 1px);
            background-size: 118px 118px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .doll-stage { position: relative; width: 100%; height: 100%; }

        /* 娃娃層 */
        .doll-skin-layer {
            position: absolute;
            width: 100%;
            height: 100%;
            background-color: #e3d2b9;
            z-index: 1;
        }
        .doll-mask-img {
            position: absolute;
            width: 100%;
            height: 100%;
            object-fit: contain;
            z-index: 2;
            pointer-events: none;
        }

        /* 獨立動態背帶 */
        .dynamic-strap {
            position: absolute;
            height: 6px;
            background-color: #d2b48c;
            border: 1px solid #333;
            box-sizing: border-box;
            z-index: 9;
            transform-origin: left center;
            pointer-events: none;
        }

        /* 包包容器撐滿畫布，方便多圖層重疊 */
        .bag-container {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: 10;
            pointer-events: none;
        }

        /* 【核心關鍵修正】使用 object-fit: none; 
           網頁絕對不會去拉伸或縮放你的圖片，圖片原本是多大，就會以 1:1 的真實尺寸呈現！
           並透過 object-position: center; 確保包包和娃娃素體以同樣的中心點重疊對齊。 */
        .bag-layer {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            object-fit: none;
            object-position: center;
            pointer-events: none;
        }

        /* 混色渲染模式 */
        .layer-render-tint {
            mix-blend-mode: multiply;
        }

        /* 壓印工藝特效 */
        .face-emboss-effect {
            mix-blend-mode: multiply;
            opacity: 0.25; 
        }

        /* 五金專屬進階金屬濾鏡 */
        .hw-gold { filter: url(#gold-filter); }
        .hw-silver { filter: url(#silver-filter); }
        .hw-bronze { filter: url(#bronze-filter); }
        .hw-black { filter: brightness(0.1); }
        .hw-rose { filter: url(#rose-gold-filter); }

        @media (max-width: 768px) {
            body { flex-direction: column; padding-top: 50px; }
            .mobile-header { display: flex; }
            .control-panel {
                position: fixed; top: 0; left: 0; height: 100vh; width: 300px;
                transform: translateX(-100%); box-shadow: 4px 0 10px rgba(0,0,0,0.2);
            }
            .control-panel.open { transform: translateX(0); }
            .close-sidebar-btn { display: block; }
            .display-area { width: 100%; height: calc(100vh - 50px); align-items: flex-start; }
        }
    </style>
</head>
<body>

    <!-- SVG 金屬變色濾鏡 -->
    <svg style="position: absolute; width: 0; height: 0;">
        <defs>
            <filter id="gold-filter">
                <feComponentTransfer>
                    <feFuncR type="linear" slope="0" replace="1"/>
                    <feFuncG type="linear" slope="0" replace="0.75"/>
                    <feFuncB type="linear" slope="0" replace="0.2"/>
                </feComponentTransfer>
            </filter>
            <filter id="silver-filter">
                <feComponentTransfer>
                    <feFuncR type="linear" slope="0" replace="0.75"/>
                    <feFuncG type="linear" slope="0" replace="0.75"/>
                    <feFuncB type="linear" slope="0" replace="0.78"/>
                </feComponentTransfer>
            </filter>
            <filter id="bronze-filter">
                <feComponentTransfer>
                    <feFuncR type="linear" slope="0" replace="0.6"/>
                    <feFuncG type="linear" slope="0" replace="0.45"/>
                    <feFuncB type="linear" slope="0" replace="0.25"/>
                </feComponentTransfer>
            </filter>
            <filter id="rose-gold-filter">
                <feComponentTransfer>
                    <feFuncR type="linear" slope="0" replace="0.85"/>
                    <feFuncG type="linear" slope="0" replace="0.62"/>
                    <feFuncB type="linear" slope="0" replace="0.62"/>
                </feComponentTransfer>
            </filter>
        </defs>
    </svg>

    <div class="mobile-header">
        <button class="toggle-btn" onclick="toggleSidebar()">☰ 選單設定</button>
    </div>

    <div class="control-panel" id="sidebar">
        <button class="close-sidebar-btn" onclick="toggleSidebar()">✕ 收起選單</button>
        <h2>素體配件模擬器</h2>
        <hr style="border: 0; border-top: 1px solid #eee; margin: 0;">
        
        <div class="row-group">
            <div class="control-group">
                <label for="main-category">素體類型</label>
                <select id="main-category" onchange="updateSubCategory()">
                    <option value="12分" selected>12分娃</option>
                    <option value="棉花娃">棉花娃</option>
                </select>
            </div>
            <div class="control-group">
                <label for="skin-preset">快速膚色</label>
                <select id="skin-preset" onchange="applySkinPreset()">
                    <option value="普肌" selected>普肌</option>
                    <option value="白肌">白肌</option>
                </select>
            </div>
        </div>

        <div class="control-group">
            <label for="sub-category">體型款式</label>
            <select id="sub-category" onchange="onDollOrBagChange()">
                <!-- JS 動態生成 -->
            </select>
        </div>

        <hr style="border: 0; border-top: 1px solid #eee; margin: 5px 0;">

        <div class="control-group">
            <label for="bag-style">包包款式</label>
            <select id="bag-style" onchange="onDollOrBagChange()">
                <option value="cat" selected>萬用貓貓包</option>
            </select>
        </div>

        <div id="dynamic-options" class="dynamic-group">
            <!-- 動態改色與工藝面板 -->
        </div>
    </div>

    <div class="display-area">
        <div class="canvas">
            <div class="doll-stage">
                <!-- 娃娃層 -->
                <div id="doll-skin" class="doll-skin-layer"></div>
                <img id="doll-mask" class="doll-mask-img" src="dolls/body_ob11.png" alt="娃娃素體">
                
                <!-- 獨立背帶：起點固定在左肩 -->
                <div id="dynamic-strap" class="dynamic-strap"></div>

                <!-- 智慧多圖層包包系統 -->
                <div class="bag-container">
                    
                    <!-- 三花款專用獨立層 -->
                    <img id="layer-calico" class="bag-layer" style="display:none;" src="" alt="">
                    
                    <!-- 主體改色組：利用 CSS mask-image 進行去背精準染色，完全不會溢出正方形色塊 -->
                    <div id="layer-main-color-block" class="bag-layer" style="mix-blend-mode: normal;">
                        <img id="layer-main" class="bag-layer layer-render-tint" src="" alt="">
                    </div>

                    <!-- 賓士改色組 -->
                    <div id="layer-tuxedo-color-block" class="bag-layer" style="mix-blend-mode: normal; display:none;">
                        <img id="layer-tuxedo" class="bag-layer layer-render-tint" src="" alt="">
                    </div>
                    
                    <!-- 表情與五金層 -->
                    <img id="layer-face" class="bag-layer" src="" alt="">
                    <img id="layer-hardware" class="bag-layer" src="" alt="">
                </div>
            </div>
        </div>
    </div>

    <script>
        // 背帶動態拉伸錨點 (會根據不同娃種微調背帶終點位置)
        const positionConfig = {
            'OB11':           { strapStartX: 235, strapStartY: 205, targetX: 295, targetY: 335 },
            '黏土娃':         { strapStartX: 238, strapStartY: 215, targetX: 292, targetY: 330 },
            '新 P9':          { strapStartX: 235, strapStartY: 210, targetX: 295, targetY: 332 },
            '10cm':          { strapStartX: 242, strapStartY: 210, targetX: 282, targetY: 290 },
            '20cm':          { strapStartX: 230, strapStartY: 215, targetX: 298, targetY: 355 }
        };

        const paletteColors = [
            { name: '原皮色', hex: '#d4a373' },
            { name: '馬鞍棕', hex: '#b57c4c' },
            { name: '櫻花粉', hex: '#ffb6c1' },
            { name: '經典黑', hex: '#212529' },
            { name: '象牙白', hex: '#f8f9fa' },
            { name: '復古紅', hex: '#ae2012' },
            { name: '午夜藍', hex: '#1a5f7a' }
        ];

        let currentMainColor = '#d4a373';
        let currentTuxedoColor = '#f8f9fa';
        let currentStrapColor = '#b57c4c';
        let currentHardware = 'hw-gold';
        let currentExpression = 'print'; 
        let currentCatPattern = 'pure';   

        const sidebar = document.getElementById('sidebar');
        const mainCategory = document.getElementById('main-category');
        const subCategory = document.getElementById('sub-category');
        const skinPreset = document.getElementById('skin-preset');
        const dollSkin = document.getElementById('doll-skin');
        const dollMask = document.getElementById('doll-mask');
        const dynamicStrap = document.getElementById('dynamic-strap');

        function toggleSidebar() { sidebar.classList.toggle('open'); }

        function updateSubCategory() {
            const selectedMain = mainCategory.value;
            subCategory.innerHTML = '';
            const opts = selectedMain === '12分' ? ['OB11', '黏土娃', '新 P9'] : ['10cm', '20cm'];
            opts.forEach(opt => {
                let el = document.createElement('option'); el.value = opt; el.textContent = opt;
                subCategory.appendChild(el);
            });
            onDollOrBagChange();
        }

        function applySkinPreset() {
            dollSkin.style.backgroundColor = skinPreset.value === '普肌' ? '#e3d2b9' : '#e5dbcc';
        }

        function onDollOrBagChange() {
            const imageMapping = {
                'OB11': 'dolls/body_ob11.png',
                '黏土娃': 'dolls/body_Nendoroid_Doll.png',
                '新 P9': 'dolls/body_p9.png',
                '10cm': 'dolls/body_10cm.png',
                '20cm': 'dolls/body_20cm.png'
            };
            dollMask.src = imageMapping[subCategory.value];

            renderControlPanel();
            refreshStrapPosition();
            refreshLayers();
        }

        function renderControlPanel() {
            const panel = document.getElementById('dynamic-options');
            panel.innerHTML = `
                <div class="control-group">
                    <label>花色款式</label>
                    <select id="cat-pattern-select" onchange="currentCatPattern=this.value; onDollOrBagChange();">
                        <option value="pure" ${currentCatPattern==='pure'?'selected':''}>純色款</option>
                        <option value="tuxedo" ${currentCatPattern==='tuxedo'?'selected':''}>賓士款</option>
                        <option value="calico" ${currentCatPattern==='calico'?'selected':''}>固定色-三花款</option>
                    </select>
                </div>
                <div id="color-pickers-zone"></div>
                <div class="control-group">
                    <label>五金顏色</label>
                    <select onchange="currentHardware=this.value; refreshLayers();">
                        <option value="hw-gold" ${currentHardware==='hw-gold'?'selected':''}>✨ 24K奢華金</option>
                        <option value="hw-silver" ${currentHardware==='hw-silver'?'selected':''}>💿 質感亮銀</option>
                        <option value="hw-rose" ${currentHardware==='hw-rose'?'selected':''}>🌹 浪漫玫瑰金</option>
                        <option value="hw-bronze" ${currentHardware==='hw-bronze'?'selected':''}>🍂 復古青古銅</option>
                        <option value="hw-black" ${currentHardware==='hw-black'?'selected':''}>🕶️ 曜石槍黑</option>
                    </select>
                </div>
                <div class="control-group">
                    <label>表情工藝</label>
                    <select onchange="currentExpression=this.value; refreshLayers();">
                        <option value="print" ${currentExpression==='print'?'selected':''}>🖤 一般精細印刷 (純黑)</option>
                        <option value="emboss" ${currentExpression==='emboss'?'selected':''}>🔨 高級皮革純壓印 (凹陷鋼印效果)</option>
                    </select>
                </div>
            `;

            const zone = document.getElementById('color-pickers-zone');
            if (currentCatPattern === 'pure') {
                zone.innerHTML = `<div class="control-group"><label>包包主體顏色</label><div class="color-palette" id="main-pal"></div></div>`;
                buildPalette('main-pal', 'main');
            } else if (currentCatPattern === 'tuxedo') {
                zone.innerHTML = `
                    <div class="control-group"><label>1. 包包底色</label><div class="color-palette" id="main-pal"></div></div>
                    <div class="control-group" style="margin-top:5px;"><label>2. 賓士區塊顏色</label><div class="color-palette" id="tux-pal"></div></div>
                `;
                buildPalette('main-pal', 'main');
                buildPalette('tux-pal', 'tuxedo');
            } else {
                zone.innerHTML = `<p style="font-size:0.85rem; color:#888; margin:5px 0;">💡 三花款為固定設計配色，已為您鎖定色彩面板。</p>`;
            }

            const strapGroup = document.createElement('div');
            strapGroup.className = 'control-group';
            strapGroup.innerHTML = `<label>皮背帶顏色</label><div class="color-palette" id="strap-pal"></div>`;
            panel.appendChild(strapGroup);
            buildPalette('strap-pal', 'strap');
        }

        function buildPalette(targetId, type) {
            const target = document.getElementById(targetId);
            paletteColors.forEach(color => {
                const swatch = document.createElement('div');
                swatch.className = 'color-swatch';
                swatch.style.backgroundColor = color.hex;
                
                if(type === 'main' && color.hex === currentMainColor) swatch.classList.add('active');
                if(type === 'tuxedo' && color.hex === currentTuxedoColor) swatch.classList.add('active');
                if(type === 'strap' && color.hex === currentStrapColor) swatch.classList.add('active');

                swatch.onclick = function() {
                    target.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('active'));
                    swatch.classList.add('active');
                    if(type === 'main') { currentMainColor = color.hex; }
                    if(type === 'tuxedo') { currentTuxedoColor = color.hex; }
                    if(type === 'strap') { currentStrapColor = color.hex; }
                    refreshLayers();
                };
                target.appendChild(swatch);
            });
        }

        function refreshStrapPosition() {
            const config = positionConfig[subCategory.value] || positionConfig['OB11'];
            const sX = config.strapStartX;
            const sY = config.strapStartY;
            const tX = config.targetX;
            const tY = config.targetY;

            const deltaX = tX - sX;
            const deltaY = tY - sY;
            const length = Math.sqrt(deltaX * deltaX + deltaY * deltaY);
            const angle = Math.atan2(deltaY, deltaX) * (180 / Math.PI);

            dynamicStrap.style.left = sX + 'px';
            dynamicStrap.style.top = sY + 'px';
            dynamicStrap.style.width = length + 'px';
            dynamicStrap.style.transform = `rotate(${angle}deg)`;
        }

        function refreshLayers() {
            const imgPath = 'bags/cat/';
            
            const lCalico = document.getElementById('layer-calico');
            const lMainBlock = document.getElementById('layer-main-color-block');
            const lMain = document.getElementById('layer-main');
            const lTuxBlock = document.getElementById('layer-tuxedo-color-block');
            const lTuxedo = document.getElementById('layer-tuxedo');
            const lFace = document.getElementById('layer-face');
            const lHardware = document.getElementById('layer-hardware');

            dynamicStrap.style.backgroundColor = currentStrapColor;

            // 用於 CSS Mask 的動態遮罩邏輯：讓背景色塊的形狀百分之百被圖片的透明度裁切，徹底解決外圍正方形色塊問題
            const maskStyle = (url) => `url('${url}') no-repeat center / url-size`;

            if (currentCatPattern === 'calico') {
                lCalico.style.display = 'block';
                lCalico.src = `${imgPath}cat_calico.png`;
                lMainBlock.style.display = 'none';
                lTuxBlock.style.display = 'none';
            } else {
                lCalico.style.display = 'none';
                
                // 主體：使用 CSS Mask 限制著色範圍
                lMainBlock.style.display = 'block';
                lMainBlock.style.backgroundColor = currentMainColor;
                lMainBlock.style.webkitMask = `url('${imgPath}cat_main.png') no-repeat center`;
                lMainBlock.style.mask = `url('${imgPath}cat_main.png') no-repeat center`;
                lMain.src = `${imgPath}cat_main.png`;

                if (currentCatPattern === 'tuxedo') {
                    lTuxBlock.style.display = 'block';
                    lTuxBlock.style.backgroundColor = currentTuxedoColor;
                    lTuxBlock.style.webkitMask = `url('${imgPath}cat_patch_tuxedo.png') no-repeat center`;
                    lTuxBlock.style.mask = `url('${imgPath}cat_patch_tuxedo.png') no-repeat center`;
                    lTuxedo.src = `${imgPath}cat_patch_tuxedo.png`;
                } else {
                    lTuxBlock.style.display = 'none';
                }
            }

            lFace.src = `${imgPath}cat_face_black.png`;
            if (currentExpression === 'emboss') {
                lFace.className = "bag-layer face-emboss-effect";
            } else {
                lFace.className = "bag-layer"; 
            }

            lHardware.src = `${imgPath}cat_hardware.png`;
            lHardware.className = `bag-layer ${currentHardware}`;
        }

        window.onload = function() {
            updateSubCategory();
            applySkinPreset();
        }
    </script>
</body>
</html>
