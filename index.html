<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2D 娃娃背包包模擬器 (1:1 剪裁遮色片版)</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f5f5f5;
            display: flex;
            height: 100vh;
            box-sizing: border-box;
            overflow: hidden;
            position: relative;
        }

        /* 手機版頂部工具列 */
        .mobile-header {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 50px;
            background-color: #ffffff;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            z-index: 99;
            align-items: center;
            padding: 0 15px;
            box-sizing: border-box;
        }

        .toggle-btn {
            background-color: #ffb6c1;
            color: #fff;
            border: none;
            padding: 8px 14px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.9rem;
        }

        /* 控制面板 */
        .control-panel {
            width: 360px;
            min-width: 360px;
            background-color: #ffffff;
            padding: 20px;
            box-shadow: 2px 0 5px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            gap: 15px;
            overflow-y: auto;
            z-index: 100;
            transition: transform 0.3s ease;
        }

        .close-sidebar-btn {
            display: none;
            background-color: #ccc;
            color: #333;
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            align-self: flex-end;
            cursor: pointer;
        }

        h2 { margin: 0 0 5px 0; font-size: 1.4rem; color: #333; }
        .row-group { display: flex; gap: 12px; width: 100%; }
        .row-group .control-group { flex: 1; }
        .control-group { display: flex; flex-direction: column; gap: 6px; }
        
        .dynamic-group {
            background-color: #f9f9f9;
            padding: 12px;
            border-radius: 6px;
            border-left: 4px solid #ffb6c1;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        label { font-weight: bold; color: #555; font-size: 0.9rem; }
        select { padding: 8px; border-radius: 4px; border: 1px solid #ccc; font-size: 0.95rem; background-color: #fff; }

        /* 色票樣式 */
        .color-palette { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 2px; }
        .color-swatch {
            width: 30px;
            height: 30px;
            border-radius: 4px;
            border: 2px solid #ccc;
            cursor: pointer;
            transition: transform 0.1s;
        }
        .color-swatch:hover { transform: scale(1.1); }
        .color-swatch.active { border-color: #333; box-shadow: 0 0 4px rgba(0,0,0,0.3); }

        /* 右側畫布區 */
        .display-area {
            flex: 1;
            background-color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: auto;
            padding: 20px;
        }

        /* 畫布固定 550x550，內部所有圖層也必須完全 550x550，不允許網頁自己縮放或置中 */
        .canvas {
            position: relative;
            width: 550px;
            height: 550px;
            min-width: 550px;
            min-height: 550px;
            border: 2px solid #ccc;
            background-color: #fafafa;
            background-image: 
                linear-gradient(to right, #e8e8e8 1px, transparent 1px),
                linear-gradient(to bottom, #e8e8e8 1px, transparent 1px);
            background-size: 118px 118px;
        }

        .doll-stage { position: relative; width: 100%; height: 100%; }

        /* 娃娃底色層 */
        .doll-skin-layer {
            position: absolute;
            width: 550px;
            height: 550px;
            top: 0;
            left: 0;
            background-color: #e3d2b9;
            z-index: 1;
        }
        
        /* 1:1 圖層標準定位：寬高寫死 550px，起點全部靠左上 (0,0)，不進行任何拉伸 */
        .layer-img {
            position: absolute;
            width: 550px;
            height: 550px;
            top: 0;
            left: 0;
            object-fit: fill;
            pointer-events: none;
        }

        /* ==================== 🛠️ 核心：剪裁遮色片技術容器 ==================== */
        /* 利用線稿 PNG 當作 Mask 遮罩，容器內填入什麼底色，就會被裁剪成什麼形狀 */
        .mask-container {
            position: absolute;
            width: 550px;
            height: 550px;
            top: 0;
            left: 0;
            pointer-events: none;
            /* 預設遮罩混合模式 */
            -webkit-mask-size: 550px 550px;
            mask-size: 550px 550px;
            -webkit-mask-repeat: no-repeat;
            mask-repeat: no-repeat;
            -webkit-mask-position: 0px 0px;
            mask-position: 0px 0px;
        }

        /* 遮色片內部的顏色填充層（可任意更換 background-color） */
        .color-fill-layer {
            width: 100%;
            height: 100%;
            transition: background-color 0.1s;
        }

        /* 壓印工藝：模擬皮革凹陷陰影 */
        .emboss-blend {
            mix-blend-mode: multiply;
            opacity: 0.35;
        }

        @media (max-width: 768px) {
            body { flex-direction: column; padding-top: 50px; }
            .mobile-header { display: flex; }
            .control-panel {
                position: fixed; top: 0; left: 0; height: 100vh; width: 300px;
                transform: translateX(-100%); box-shadow: 4px 0 10px rgba(0,0,0,0.2);
            }
            .control-panel.open { transform: translateX(0); }
            .close-sidebar-btn { display: block; }
            .display-area { width: 100%; height: calc(100vh - 50px); align-items: flex-start; }
        }
    </style>
</head>
<body>

    <div class="mobile-header">
        <button class="toggle-btn" onclick="toggleSidebar()">☰ 選單設定</button>
    </div>

    <div class="control-panel" id="sidebar">
        <button class="close-sidebar-btn" onclick="toggleSidebar()">✕ 收起選單</button>
        <h2>素體配件模擬器</h2>
        <hr style="border: 0; border-top: 1px solid #eee; margin: 0;">
        
        <div class="row-group">
            <div class="control-group">
                <label for="main-category">素體類型</label>
                <select id="main-category" onchange="updateSubCategory()">
                    <option value="12分" selected>12分娃</option>
                    <option value="棉花娃">棉花娃</option>
                </select>
            </div>
            <div class="control-group">
                <label for="skin-preset">快速膚色</label>
                <select id="skin-preset" onchange="applySkinPreset()">
                    <option value="普肌" selected>普肌</option>
                    <option value="白肌">白肌</option>
                </select>
            </div>
        </div>

        <div class="control-group">
            <label for="sub-category">體型款式</label>
            <select id="sub-category" onchange="onDollOrBagChange()">
                </select>
        </div>

        <hr style="border: 0; border-top: 1px solid #eee; margin: 5px 0;">

        <div class="control-group">
            <label for="bag-style">包包款式</label>
            <select id="bag-style" onchange="onDollOrBagChange()">
                <option value="cat" selected>萬用貓貓包</option>
            </select>
        </div>

        <div id="dynamic-options" class="dynamic-group">
            </div>
    </div>

    <div class="display-area">
        <div class="canvas">
            <div class="doll-stage">
                <div id="doll-skin" class="doll-skin-layer"></div>
                <img id="doll-mask" class="layer-img" src="dolls/body_ob11.png" alt="娃娃素體">
                
                <div id="mask-main-container" class="mask-container" style="z-index:10;">
                    <div id="fill-main-color" class="color-fill-layer"></div>
                </div>

                <div id="mask-tux-container" class="mask-container" style="z-index:11; display:none;">
                    <div id="fill-tux-color" class="color-fill-layer"></div>
                </div>

                <img id="layer-calico" class="layer-img" style="display:none; z-index:12;" src="" alt="">
                
                <div id="mask-face-container" class="mask-container" style="z-index:13;">
                    <div id="fill-face-color" class="color-fill-layer"></div>
                </div>

                <div id="mask-hardware-container" class="mask-container" style="z-index:14;">
                    <div id="fill-hardware-color" class="color-fill-layer"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const paletteColors = [
            { name: '原皮色', hex: '#d4a373' },
            { name: '馬鞍棕', hex: '#b57c4c' },
            { name: '櫻花粉', hex: '#ffb6c1' },
            { name: '經典黑', hex: '#212529' },
            { name: '象牙白', hex: '#f8f9fa' },
            { name: '復古紅', hex: '#ae2012' },
            { name: '午夜藍', hex: '#1a5f7a' }
        ];

        // 精準對應色彩對照表
        const hardwareColors = {
            'gold': '#ffd700',   // 金
            'silver': '#e0e0e0', // 銀
            'bronze': '#b8860b', // 古銅 (暗金)
            'black': '#222222'   // 槍黑
        };

        const foilColors = {
            'emboss': '#554433',      // 壓印底色 (配合混合模式)
            'foil-gold': '#ffd700',   // 燙金-金
            'foil-silver': '#e0e0e0', // 燙金-銀
            'foil-rose': '#b76e79',   // 燙金-玫瑰金
            'foil-black': '#111111'   // 燙金-黑
        };

        let currentMainColor = '#d4a373';
        let currentTuxedoColor = '#f8f9fa';
        let currentHardware = 'gold';
        let currentExpression = 'emboss'; 
        let currentCatPattern = 'pure';   

        const sidebar = document.getElementById('sidebar');
        const mainCategory = document.getElementById('main-category');
        const subCategory = document.getElementById('sub-category');
        const skinPreset = document.getElementById('skin-preset');
        const dollSkin = document.getElementById('doll-skin');
        const dollMask = document.getElementById('doll-mask');

        function toggleSidebar() { sidebar.classList.toggle('open'); }

        function updateSubCategory() {
            const selectedMain = mainCategory.value;
            subCategory.innerHTML = '';
            const opts = selectedMain === '12分' ? ['OB11', '黏土娃', '新 P9'] : ['10cm', '20cm'];
            opts.forEach(opt => {
                let el = document.createElement('option'); el.value = opt; el.textContent = opt;
                subCategory.appendChild(el);
            });
            onDollOrBagChange();
        }

        function applySkinPreset() {
            dollSkin.style.backgroundColor = skinPreset.value === '普肌' ? '#e3d2b9' : '#e5dbcc';
        }

        function onDollOrBagChange() {
            const imageMapping = {
                'OB11': 'dolls/body_ob11.png',
                '黏土娃': 'dolls/body_Nendoroid_Doll.png',
                '新 P9': 'dolls/body_p9.png',
                '10cm': 'dolls/body_10cm.png',
                '20cm': 'dolls/body_20cm.png'
            };
            dollMask.src = imageMapping[subCategory.value];

            renderControlPanel();
            refreshLayers();
        }

        function renderControlPanel() {
            const panel = document.getElementById('dynamic-options');
            panel.innerHTML = `
                <div class="control-group">
                    <label>花色款式</label>
                    <select id="cat-pattern-select" onchange="currentCatPattern=this.value; onDollOrBagChange();">
                        <option value="pure" ${currentCatPattern==='pure'?'selected':''}>純色款</option>
                        <option value="tuxedo" ${currentCatPattern==='tuxedo'?'selected':''}>賓士款</option>
                        <option value="calico" ${currentCatPattern==='calico'?'selected':''}>固定色-三花款</option>
                    </select>
                </div>
                <div id="color-pickers-zone"></div>
                <div class="control-group">
                    <label>五金顏色</label>
                    <select onchange="currentHardware=this.value; refreshLayers();">
                        <option value="gold" ${currentHardware==='gold'?'selected':''}>金</option>
                        <option value="silver" ${currentHardware==='silver'?'selected':''}>銀</option>
                        <option value="bronze" ${currentHardware==='bronze'?'selected':''}>古銅</option>
                        <option value="black" ${currentHardware==='black'?'selected':''}>槍黑</option>
                    </select>
                </div>
                <div class="control-group">
                    <label>燙金/壓印加工</label>
                    <select onchange="currentExpression=this.value; refreshLayers();">
                        <option value="emboss" ${currentExpression==='emboss'?'selected':''}>壓印</option>
                        <option value="foil-gold" ${currentExpression==='foil-gold'?'selected':''}>燙金-金</option>
                        <option value="foil-silver" ${currentExpression==='foil-silver'?'selected':''}>燙金-銀</option>
                        <option value="foil-rose" ${currentExpression==='foil-rose'?'selected':''}>燙金-玫瑰金</option>
                        <option value="foil-black" ${currentExpression==='foil-black'?'selected':''}>燙金-黑</option>
                    </select>
                </div>
            `;

            const zone = document.getElementById('color-pickers-zone');
            if (currentCatPattern === 'pure') {
                zone.innerHTML = `<div class="control-group"><label>包包主體顏色</label><div class="color-palette" id="main-pal"></div></div>`;
                buildPalette('main-pal', 'main');
            } else if (currentCatPattern === 'tuxedo') {
                zone.innerHTML = `
                    <div class="control-group"><label>1. 包包底色</label><div class="color-palette" id="main-pal"></div></div>
                    <div class="control-group" style="margin-top:5px;"><label>2. 賓士區塊顏色</label><div class="color-palette" id="tux-pal"></div></div>
                `;
                buildPalette('main-pal', 'main');
                buildPalette('tux-pal', 'tuxedo');
            }
        }

        function buildPalette(targetId, type) {
            const target = document.getElementById(targetId);
            if(!target) return;
            paletteColors.forEach(color => {
                const swatch = document.createElement('div');
                swatch.className = 'color-swatch';
                swatch.style.backgroundColor = color.hex;
                
                if(type === 'main' && color.hex === currentMainColor) swatch.classList.add('active');
                if(type === 'tuxedo' && color.hex === currentTuxedoColor) swatch.classList.add('active');

                swatch.onclick = function() {
                    target.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('active'));
                    swatch.classList.add('active');
                    if(type === 'main') { currentMainColor = color.hex; }
                    if(type === 'tuxedo') { currentTuxedoColor = color.hex; }
                    refreshLayers();
                };
                target.appendChild(swatch);
            });
        }

        // ==================== 🎛️ 核心重疊渲染與剪裁遮色片邏輯 ====================
        function refreshLayers() {
            const imgPath = 'bags/cat/';
            
            // 獲取 DOM 容器
            const mMainCont = document.getElementById('mask-main-container');
            const fMainColor = document.getElementById('fill-main-color');
            const mTuxCont = document.getElementById('mask-tux-container');
            const fTuxColor = document.getElementById('fill-tux-color');
            const lCalico = document.getElementById('layer-calico');
            
            const mFaceCont = document.getElementById('mask-face-container');
            const fFaceColor = document.getElementById('fill-face-color');
            const mHwCont = document.getElementById('mask-hardware-container');
            const fHwColor = document.getElementById('fill-hardware-color');

            // 1. 處理主體、賓士與三花
            if (currentCatPattern === 'calico') {
                lCalico.style.display = 'block';
                lCalico.src = `${imgPath}cat_calico.png`;
                mMainCont.style.display = 'none';
                mTuxCont.style.display = 'none';
            } else {
                lCalico.style.display = 'none';
                
                // 【核心遮罩設定】把線稿圖檔直接指派為 CSS Mask
                mMainCont.style.display = 'block';
                mMainCont.style.webkitMaskImage = `url('${imgPath}cat_main.png')`;
                mMainCont.style.maskImage = `url('${imgPath}cat_main.png')`;
                fMainColor.style.backgroundColor = currentMainColor; // 填色

                if (currentCatPattern === 'tuxedo') {
                    mTuxCont.style.display = 'block';
                    mTuxCont.style.webkitMaskImage = `url('${imgPath}cat_patch_tuxedo.png')`;
                    mTuxCont.style.maskImage = `url('${imgPath}cat_patch_tuxedo.png')`;
                    fTuxColor.style.backgroundColor = currentTuxedoColor; // 填色
                } else {
                    mTuxCont.style.display = 'none';
                }
            }

            // 2. 表情工藝【剪裁遮色片連動】
            mFaceCont.style.webkitMaskImage = `url('${imgPath}cat_face_black.png')`;
            mFaceCont.style.maskImage = `url('${imgPath}cat_face_black.png')`;
            fFaceColor.style.backgroundColor = foilColors[currentExpression];
            
            // 如果是壓印加工，套用正片疊底混合模式模擬皮革凹陷陰影
            if (currentExpression === 'emboss') {
                mFaceCont.className = "mask-container emboss-blend";
            } else {
                mFaceCont.className = "mask-container";
            }

            // 3. 五金顏色【剪裁遮色片連動】
            mHwCont.style.webkitMaskImage = `url('${imgPath}cat_hardware.png')`;
            mHwCont.style.maskImage = `url('${imgPath}cat_hardware.png')`;
            fHwColor.style.backgroundColor = hardwareColors[currentHardware];
        }

        window.onload = function() {
            updateSubCategory();
            applySkinPreset();
        }
    </script>
</body>
</html>
